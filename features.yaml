# 家庭目标管理App - 用户故事

# 实体定义
entities:
  - name: 孩子
    description: 家庭中的孩子用户，可以查看和完成任务，但无法创建或删除任务
  - name: 家长
    description: 家庭中的家长用户，可以创建、删除任务，查看所有家庭成员的星星统计，管理家庭成员
  - name: 目标
    description: 家长为孩子设置的日常任务，包含标题、描述和奖励星星数量
  - name: 星星
    description: 孩子完成目标后获得的奖励，可以累计统计
  - name: 星星日志
    description: 记录孩子获得星星的详细日志，包括获得时间、数量和对应的目标
  - name: 家庭
    description: 一个家庭包含一个或多个家长和孩子，共享同一个PIN码用于登录验证
  - name: PIN码
    description: 家庭的统一验证码，用于登录时验证家庭成员身份，一个家庭只有一个PIN码

# 用户故事
user_stories:
  - id: US001
    title: 孩子查看今日目标
    description: 作为_(孩子)，我希望能够查看今日需要完成的所有目标，以便了解需要做什么
    actor: 孩子
    priority: 高
    features:
      - id: F001
        name: 查看目标列表
        description: 展示所有待完成的目标列表
        interactions:
          - 场景: 孩子登录后进入应用
            操作: 点击底部导航栏的"目标"标签
            预期结果: 显示所有待完成的目标列表，包括目标标题、描述和奖励星星数量
          - 场景: 查看已完成目标
            操作: 滚动到页面底部的"已完成目标"区域
            预期结果: 显示所有已完成的目标，目标标题带有删除线，并显示完成时间

  - id: US002
    title: 孩子完成目标
    description: 作为_(孩子)，我希望能够将目标标记为已完成，以便获得星星奖励
    actor: 孩子
    priority: 高
    features:
      - id: F002
        name: 完成目标
        description: 孩子可以将待完成的目标标记为已完成
        interactions:
          - 场景: 完成单个目标
            操作: 在目标卡片上点击"完成"按钮
            预期结果: 
              - 目标状态从"待完成"变为"已完成"
              - 目标移动到"已完成目标"区域
              - 自动获得目标对应的星星数量
              - 在星星日志中记录本次获得星星的信息
          - 场景: 验证完成效果
            操作: 切换到"星星"标签
            预期结果: 
              - 星星总数增加
              - 星星日志中显示最新的获取记录
          - 场景: 重复完成同一目标
            操作: 尝试再次点击已完成目标的"完成"按钮
            预期结果: 
              - 按钮不可点击或隐藏
              - 不会重复获得星星

  - id: US003
    title: 孩子查看星星统计
    description: 作为_(孩子)，我希望能够查看自己累计的星星数量和获取记录，以便了解自己的成就
    actor: 孩子
    priority: 中
    features:
      - id: F003
        name: 查看星星统计
        description: 孩子可以查看自己的星星总数和获取日志
        interactions:
          - 场景: 查看星星总数
            操作: 点击底部导航栏的"星星"标签
            预期结果: 
              - 顶部显示当前用户的星星总数
              - 显示醒目的星星图标和数字
          - 场景: 查看星星获取日志
            操作: 滚动到页面底部的"星星获取日志"区域
            预期结果: 
              - 按时间倒序显示所有星星获取记录
              - 每条记录显示获得星星数量、时间和对应的目标
          - 场景: 切换查看家庭成员
            操作: 使用用户选择器切换到其他家庭成员
            预期结果: 
              - 显示所选成员的星星总数和日志
              - 对于孩子用户，可以查看所有家庭成员的星星统计

  - id: US004
    title: 孩子无法修改目标
    description: 作为_(孩子)，我不应该能够修改或删除目标，以确保目标由家长统一管理
    actor: 孩子
    priority: 高
    features:
      - id: F004
        name: 目标权限控制
        description: 孩子用户只有完成目标的权限，没有创建、修改或删除目标的权限
        interactions:
          - 场景: 尝试添加目标
            操作: 查看页面顶部
            预期结果: 
              - 不显示"添加目标"按钮
              - 无法访问添加目标的表单
          - 场景: 尝试删除目标
            操作: 查看目标卡片
            预期结果: 
              - 不显示"删除"按钮
              - 无法删除任何目标
          - 场景: 尝试修改目标内容
            操作: 点击目标标题或描述
            预期结果: 
              - 文本不可编辑
              - 没有编辑入口

  - id: US005
    title: 家长管理目标
    description: 作为_(家长)，我希望能够创建、删除目标，以便为孩子设置日常任务
    actor: 家长
    priority: 高
    features:
      - id: F005
        name: 目标管理
        description: 家长可以创建和删除目标
        interactions:
          - 场景: 创建新目标
            操作: 
              - 点击"添加目标"按钮
              - 填写目标标题、描述
              - 设置奖励星星数量
              - 点击"添加目标"确认
            预期结果: 
              - 新目标添加到待完成列表
              - 显示在所有家庭成员的目标列表中
          - 场景: 删除目标
            操作: 
              - 点击目标卡片上的"删除"按钮
              - 确认删除操作
            预期结果: 
              - 目标从列表中移除
              - 对应的星星日志保留
          - 场景: 查看所有家庭成员目标
            操作: 切换到"目标"标签
            预期结果: 
              - 显示家庭中所有孩子的目标
              - 可以看到每个目标的完成状态

  - id: US006
    title: 用户注册新家庭
    description: 作为_(新用户)，我希望能够注册一个新家庭，以便开始使用家庭目标管理系统（打卡鸭）
    actor: 新用户
    priority: 高
    features:
      - id: F006
        name: 家庭注册
        description: 新用户可以创建家庭账户并注册第一个用户
        interactions:
          - 场景: 填写注册信息
            操作:
              - 输入家庭名称
              - 输入家庭邮箱
              - 设置家庭PIN码（4-6位）
              - 输入用户姓名
              - 设置登录密码
              - 选择用户角色（家长/孩子）
              - 点击"注册"按钮
            预期结果:
              - 创建新家庭
              - 创建第一个用户
              - 自动登录并跳转到目标页面
          - 场景: 邮箱已存在
            操作: 使用已注册的邮箱进行注册
            预期结果:
              - 显示错误提示"该邮箱已被注册"
              - 注册失败
          - 场景: 表单验证
            操作:
              - 不填写必填字段
              - PIN码不在4-6位范围内
              - 密码少于6位
              - 两次输入密码不一致
            预期结果:
              - 显示相应的错误提示
              - 阻止提交

  - id: US007
    title: 用户登录
    description: 作为_(已注册用户)，我希望能够使用邮箱、PIN码和密码登录系统，以便使用各项功能
    actor: 已注册用户
    priority: 高
    features:
      - id: F007
        name: 用户登录
        description: 用户可以通过邮箱、PIN码和密码登录系统
        interactions:
          - 场景: 成功登录
            操作:
              - 输入家庭邮箱
              - 输入家庭PIN码
              - 输入登录密码
              - 选择用户角色（家长/孩子）
              - 点击"登录"按钮
            预期结果:
              - 验证通过
              - 自动跳转到目标页面
              - 保存登录状态
          - 场景: 登录失败
            操作: 输入错误的邮箱、PIN码或密码
            预期结果:
              - 显示错误提示
              - 保持在登录页面
          - 场景: 未注册用户
            操作: 点击"创建新家庭"链接
            预期结果:
              - 跳转到注册页面

  - id: US008
    title: 家长管理孩子
    description: 作为_(家长)，我希望能够添加、编辑和删除孩子账户，以便管理家庭成员
    actor: 家长
    priority: 中
    features:
      - id: F008
        name: 孩子账户管理
        description: 家长可以管理家庭中的孩子账户
        interactions:
          - 场景: 添加孩子
            操作:
              - 点击"管理孩子"按钮
              - 点击"添加孩子"按钮
              - 输入孩子姓名
              - 输入登录密码
              - 点击"添加"按钮
            预期结果:
              - 创建新孩子账户
              - 自动使用家庭PIN码
              - 刷新孩子列表
          - 场景: 编辑孩子信息
            操作:
              - 点击孩子卡片上的"编辑"按钮
              - 修改孩子姓名
              - 修改登录密码
              - 点击"保存"按钮
            预期结果:
              - 更新孩子信息
              - PIN码保持不变（不能修改）
              - 刷新孩子列表
          - 场景: 删除孩子
            操作:
              - 点击孩子卡片上的"删除"按钮
              - 确认删除操作
            预期结果:
              - 从家庭中移除该孩子
              - 刷新孩子列表
          - 场景: 查看孩子列表
            操作: 点击"管理孩子"按钮
            预期结果:
              - 显示所有孩子列表
              - 每个孩子显示头像和姓名
              - 可以进行编辑或删除操作
          - 场景: 孩子无法管理孩子
            操作: 孩子用户查看页面
            预期结果:
              - 不显示"管理孩子"按钮
              - 无法访问孩子管理功能

  - id: US009
    title: 移动端导航
    description: 作为_(用户)，我希望通过底部导航栏在"目标"和"星星"两个主要功能之间切换，以便快速访问
    actor: 用户
    priority: 高
    features:
      - id: F009
        name: 底部导航栏
        description: 移动端优先的底部导航栏，包含"目标"和"星星"两个标签
        interactions:
          - 场景: 切换到目标页面
            操作: 点击底部导航栏的"目标"标签
            预期结果:
              - 显示目标页面
              - 标签高亮显示
              - 显示所有待完成和已完成的目标
          - 场景: 切换到星星页面
            操作: 点击底部导航栏的"星星"标签
            预期结果:
              - 显示星星页面
              - 标签高亮显示
              - 显示星星总数和获取日志
          - 场景: 导航栏固定显示
            操作: 滚动页面内容
            预期结果:
              - 底部导航栏保持固定在屏幕底部
              - 始终可见可点击

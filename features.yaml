# 家庭目标管理App - 用户故事

# 实体定义
entities:
  - name: 孩子
    description: 家庭中的孩子用户，可以查看和完成任务，但无法创建或删除任务
  - name: 家长
    description: 家庭中的家长用户，可以创建、删除任务，查看所有家庭成员的星星统计
  - name: 目标
    description: 家长为孩子设置的日常任务，包含标题、描述和奖励星星数量
  - name: 星星
    description: 孩子完成目标后获得的奖励，可以累计统计
  - name: 星星日志
    description: 记录孩子获得星星的详细日志，包括获得时间、数量和对应的目标

# 用户故事
user_stories:
  - id: US001
    title: 孩子查看今日目标
    description: 作为_(孩子)，我希望能够查看今日需要完成的所有目标，以便了解需要做什么
    actor: 孩子
    priority: 高
    features:
      - id: F001
        name: 查看目标列表
        description: 展示所有待完成的目标列表
        interactions:
          - 场景: 孩子登录后进入应用
            操作: 点击底部导航栏的"目标"标签
            预期结果: 显示所有待完成的目标列表，包括目标标题、描述和奖励星星数量
          - 场景: 查看已完成目标
            操作: 滚动到页面底部的"已完成目标"区域
            预期结果: 显示所有已完成的目标，目标标题带有删除线，并显示完成时间

  - id: US002
    title: 孩子完成目标
    description: 作为_(孩子)，我希望能够将目标标记为已完成，以便获得星星奖励
    actor: 孩子
    priority: 高
    features:
      - id: F002
        name: 完成目标
        description: 孩子可以将待完成的目标标记为已完成
        interactions:
          - 场景: 完成单个目标
            操作: 在目标卡片上点击"完成"按钮
            预期结果: 
              - 目标状态从"待完成"变为"已完成"
              - 目标移动到"已完成目标"区域
              - 自动获得目标对应的星星数量
              - 在星星日志中记录本次获得星星的信息
          - 场景: 验证完成效果
            操作: 切换到"星星"标签
            预期结果: 
              - 星星总数增加
              - 星星日志中显示最新的获取记录
          - 场景: 重复完成同一目标
            操作: 尝试再次点击已完成目标的"完成"按钮
            预期结果: 
              - 按钮不可点击或隐藏
              - 不会重复获得星星

  - id: US003
    title: 孩子查看星星统计
    description: 作为_(孩子)，我希望能够查看自己累计的星星数量和获取记录，以便了解自己的成就
    actor: 孩子
    priority: 中
    features:
      - id: F003
        name: 查看星星统计
        description: 孩子可以查看自己的星星总数和获取日志
        interactions:
          - 场景: 查看星星总数
            操作: 点击底部导航栏的"星星"标签
            预期结果: 
              - 顶部显示当前用户的星星总数
              - 显示醒目的星星图标和数字
          - 场景: 查看星星获取日志
            操作: 滚动到页面底部的"星星获取日志"区域
            预期结果: 
              - 按时间倒序显示所有星星获取记录
              - 每条记录显示获得星星数量、时间和对应的目标
          - 场景: 切换查看家庭成员
            操作: 使用用户选择器切换到其他家庭成员
            预期结果: 
              - 显示所选成员的星星总数和日志
              - 对于孩子用户，可以查看所有家庭成员的星星统计

  - id: US004
    title: 孩子无法修改目标
    description: 作为_(孩子)，我不应该能够修改或删除目标，以确保目标由家长统一管理
    actor: 孩子
    priority: 高
    features:
      - id: F004
        name: 目标权限控制
        description: 孩子用户只有完成目标的权限，没有创建、修改或删除目标的权限
        interactions:
          - 场景: 尝试添加目标
            操作: 查看页面顶部
            预期结果: 
              - 不显示"添加目标"按钮
              - 无法访问添加目标的表单
          - 场景: 尝试删除目标
            操作: 查看目标卡片
            预期结果: 
              - 不显示"删除"按钮
              - 无法删除任何目标
          - 场景: 尝试修改目标内容
            操作: 点击目标标题或描述
            预期结果: 
              - 文本不可编辑
              - 没有编辑入口

  - id: US005
    title: 家长管理目标
    description: 作为_(家长)，我希望能够创建、删除目标，以便为孩子设置日常任务
    actor: 家长
    priority: 高
    features:
      - id: F005
        name: 目标管理
        description: 家长可以创建和删除目标
        interactions:
          - 场景: 创建新目标
            操作: 
              - 点击"添加目标"按钮
              - 填写目标标题、描述
              - 设置奖励星星数量
              - 点击"添加目标"确认
            预期结果: 
              - 新目标添加到待完成列表
              - 显示在所有家庭成员的目标列表中
          - 场景: 删除目标
            操作: 
              - 点击目标卡片上的"删除"按钮
              - 确认删除操作
            预期结果: 
              - 目标从列表中移除
              - 对应的星星日志保留
          - 场景: 查看所有家庭成员目标
            操作: 切换到"目标"标签
            预期结果: 
              - 显示家庭中所有孩子的目标
              - 可以看到每个目标的完成状态
